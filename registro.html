<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - TuTaller.pe</title>

    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

<header>
    <div class="logo">TuTaller.pe</div>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="talleres.html">Talleres</a>
        <a href="login.html">Login</a>
        <a href="registro.html">Registro</a>
        <a href="admin.html">Administrador</a>
    </nav>
</header>

<main class="page">

    <section class="form-box large">

        <h1 class="form-title">
            Crear cuenta
        </h1>

        <form id="registroForm" novalidate>

            <div class="form-group">
                <label for="registroNombre">Nombres completos</label>

                <input 
                    type="text"
                    id="registroNombre"
                    placeholder="Ingrese sus nombres">

                <div id="errorRegistroNombre" class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="registroCorreo">Correo electrónico</label>

                <input 
                    type="email"
                    id="registroCorreo"
                    placeholder="Ingrese su correo">

                <div id="errorRegistroCorreo" class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="registroTelefono">Teléfono</label>

                <input 
                    type="tel"
                    id="registroTelefono"
                    placeholder="Ingrese su número">

                <div id="errorRegistroTelefono" class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="registroInteres">Interés principal</label>

                <select id="registroInteres">
                    <option value="">Seleccione una categoría</option>
                    <option>Arte</option>
                    <option>Música</option>
                    <option>Danza</option>
                    <option>Tecnología</option>
                    <option>Cocina</option>
                </select>

                <div id="errorRegistroInteres" class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="registroPassword">Contraseña</label>

                <input 
                    type="password"
                    id="registroPassword"
                    placeholder="Mínimo 8 caracteres, una mayúscula y un número">

                <div id="errorRegistroPassword" class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="registroConfirmar">Confirmar contraseña</label>

                <input 
                    type="password"
                    id="registroConfirmar"
                    placeholder="Repita la contraseña">

                <div id="errorRegistroConfirmar" class="error-msg"></div>
            </div>

            <div class="form-group">
                <button type="submit" class="btn-full">
                    Registrarse
                </button>
            </div>

        </form>

        <div style="text-align:center; margin-top:20px;">

            <p style="margin-bottom:10px; color:#666;">
                ¿Ya tienes una cuenta?
            </p>

            <a href="login.html" class="btn-secondary">
                Iniciar sesión
            </a>

        </div>

    </section>

</main>

<footer>
    <p>
        © 2026 TuTaller.pe - Plataforma de talleres culturales y educativos
    </p>
</footer>

<script src="js/script.js"></script>

</body>
</html>
