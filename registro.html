<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - TuTaller.pe</title>

    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="logo">
            TuTaller.pe
        </div>

        <nav>
            <a href="index.html">Inicio</a>
            <a href="talleres.html">Talleres</a>
            <a href="login.html">Login</a>
            <a href="registro.html">Registro</a>
            <a href="admin.html">Administrador</a>
        </nav>

    </header>


    <!-- CONTENIDO -->

    <main class="page">

        <section class="form-box large">

            <h1 class="form-title">
                Crear cuenta
            </h1>

            <form>

                <!-- NOMBRE -->

                <div class="form-group">

                    <label>Nombres completos</label>

                    <input 
                        type="text"
                        placeholder="Ingrese sus nombres">

                </div>


                <!-- CORREO -->

                <div class="form-group">

                    <label>Correo electrónico</label>

                    <input 
                        type="email"
                        placeholder="Ingrese su correo">

                </div>


                <!-- TELÉFONO -->

                <div class="form-group">

                    <label>Teléfono</label>

                    <input 
                        type="tel"
                        placeholder="Ingrese su número">

                </div>


                <!-- CATEGORÍA -->

                <div class="form-group">

                    <label>Interés principal</label>

                    <select>

                        <option>Seleccione una categoría</option>

                        <option>Arte</option>

                        <option>Música</option>

                        <option>Danza</option>

                        <option>Tecnología</option>

                        <option>Cocina</option>

                    </select>

                </div>


                <!-- CONTRASEÑA -->

                <div class="form-group">

                    <label>Contraseña</label>

                    <input 
                        type="password"
                        placeholder="Ingrese una contraseña">

                </div>


                <!-- CONFIRMAR -->

                <div class="form-group">

                    <label>Confirmar contraseña</label>

                    <input 
                        type="password"
                        placeholder="Repita la contraseña">

                </div>


                <!-- BOTÓN -->

                <div class="form-group">

                    <button type="submit" class="btn-full">
                        Registrarse
                    </button>

                </div>

            </form>


            <!-- LOGIN -->

            <div style="text-align:center; margin-top:20px;">

                <p style="margin-bottom:10px; color:#666;">
                    ¿Ya tienes una cuenta?
                </p>

                <a href="login.html" class="btn-secondary">
                    Iniciar sesión
                </a>

            </div>

        </section>

    </main>


    <!-- FOOTER -->

    <footer>

        <p>
            © 2026 TuTaller.pe - Plataforma de talleres culturales y educativos
        </p>

    </footer>

</body>
</html>
