<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TuTaller.pe</title>

    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

<header>
    <div class="logo">TuTaller.pe</div>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="talleres.html">Talleres</a>
        <a href="login.html">Login</a>
        <a href="registro.html">Registro</a>
        <a href="admin.html">Administrador</a>
    </nav>
</header>

<main class="page">

    <section class="form-box">

        <h1 class="form-title">Iniciar sesión</h1>

        <form id="loginForm" novalidate>

            <div class="form-group">
                <label for="loginCorreo">Correo electrónico</label>

                <input 
                    type="email"
                    id="loginCorreo"
                    placeholder="Ingrese su correo">

                <div id="errorLoginCorreo" class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="loginPassword">Contraseña</label>

                <input 
                    type="password"
                    id="loginPassword"
                    placeholder="Ingrese su contraseña">

                <div id="errorLoginPassword" class="error-msg"></div>
            </div>

            <div class="form-group">
                <button type="submit" class="btn-full">
                    Ingresar
                </button>
            </div>

        </form>

        <div style="text-align:center; margin-top:20px;">

            <p style="color:#666; margin-bottom:10px;">
                ¿No tienes cuenta?
            </p>

            <a href="registro.html" class="btn-secondary">
                Crear cuenta
            </a>

        </div>

    </section>

</main>

<footer>
    <p>
        © 2026 TuTaller.pe - Plataforma de talleres culturales y educativos
    </p>
</footer>

<script src="js/script.js"></script>

</body>
</html>
