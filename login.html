<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TuTaller.pe</title>

    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <!-- HEADER -->

    <header>
        <div class="logo">TuTaller.pe</div>

        <nav>
            <a href="index.html">Inicio</a>

            <h1 class="form-title">Iniciar sesión</h1>

            <form>

                <div class="form-group">
                    <label>Correo electrónico</label>

                    <input 
                        type="email"

                    <label>Contraseña</label>

                    <input

            </form>

            </div>

        </section>

    </main>


    <!-- FOOTER -->

    <footer>

        <p>
            © 2026 TuTaller.pe - Plataforma de talleres culturales y educativos
